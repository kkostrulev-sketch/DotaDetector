model:
  weights_path: "../weights/yolov8n-obb.pt"   # ← Путь к скачанному файлу
  version: "yolov8n-obb"
  architecture: "yolo-obb"                     # ← Обязательно указать "obb"
  input_size: 1024
  classes:
    - plane
    - baseball-diamond
    - bridge
    - ground-track-field
    - small-vehicle
    - large-vehicle
    - ship
    - tennis-court
    - basketball-court
    - storage-tank
    - soccer-ball-field
    - roundabout
    - harbor
    - swimming-pool
    - helicopter

inference:
  confidence_threshold: 0.25
  iou_threshold: 0.45
  device: "auto"   # auto, cuda или cpu

service:
  host: "0.0.0.0"
  port: 8000
  max_upload_size_mb: 50
  history_db: "data/history.db"
  results_dir: "data/results"